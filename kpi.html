<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Tracker Pegadaian</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --pgd-hijau-botol: #003319; 
            --pgd-green-gradient: linear-gradient(180deg, #004d29 0%, #002b16 100%);
            --pgd-gold: #FDB913; 
            --pgd-light: #f4f7f6; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--pgd-light); margin: 0; padding-bottom: 30px; }
        
        /* --- HEADER SUPER SLIM --- */
        .header { 
            background: var(--pgd-green-gradient); 
            color: white; 
            padding: 10px 15px; /* Padding diciutkan */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            border-bottom: 4px solid var(--pgd-gold); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }
        .logo-img { 
            max-width: 120px; /* Ukuran Logo diperkecil */
            height: auto; 
            margin-bottom: 4px; 
        }
        .header h1 { 
            margin: 0; 
            font-size: 0.85rem; /* Font Judul diperkecil */
            letter-spacing: 1px; 
            text-transform: uppercase; 
            font-weight: 800; 
        }
        
        /* Score KPI Pill */
        .summary-card {
            background: white; 
            margin: 8px auto; 
            max-width: 220px; 
            border-radius: 50px; 
            padding: 4px 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 10px;
            border: 1.5px solid var(--pgd-gold); 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .summary-label { font-size: 0.6rem; font-weight: 800; color: #666; text-transform: uppercase; }
        .summary-value { font-size: 1.1rem; font-weight: 900; color: var(--pgd-hijau-botol); }

        /* Filter Section - Diatur Sticky agar pas di bawah header slim */
        .filter-section { 
            background: #ffffff; 
            padding: 6px 12px; 
            display: flex; 
            gap: 6px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 72px; /* Disesuaikan dengan tinggi header baru */
            z-index: 999; 
        }
        select { flex: 1; padding: 6px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.7rem; color: var(--pgd-hijau-botol); font-weight: 700; outline: none; }

        .container { padding: 10px; max-width: 480px; margin: 0 auto; }
        .kpi-card { background: white; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eef2f0; }
        .kpi-header { background: #fdfdfd; padding: 10px 12px; font-weight: 800; color: var(--pgd-hijau-botol); font-size: 0.85rem; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .kpi-header i { margin-right: 8px; color: var(--pgd-gold); font-size: 0.8rem; }
        
        .card-body { padding: 10px 12px; }
        .data-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #f0f0f0; font-size: 0.8rem; }
        .value { font-weight: 700; color: #212529; }
        
        .input-group { margin-top: 10px; display: flex; gap: 6px; background: #f4fbf8; padding: 8px; border-radius: 8px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccd6d1; border-radius: 5px; font-size: 0.85rem; text-align: center; outline: none; }
        .btn-save { background: var(--pgd-hijau-botol); color: white; border: none; padding: 0 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        
        .kpi-footer { background: #fffef7; padding: 10px 12px; border-top: 1px solid #f9ebbe; }
        .progress-label { font-size: 0.65rem; font-weight: 800; color: var(--pgd-hijau-botol); margin-bottom: 4px; display: block; }
        .progress-bg { background: #e9ecef; height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pgd-gold), #28a745); }

        /* Notif Pro */
        #toast { visibility: hidden; min-width: 200px; background-color: #ffffff; color: var(--pgd-hijau-botol); text-align: center; border-radius: 50px; padding: 10px 15px; position: fixed; z-index: 2000; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 2px solid var(--pgd-hijau-botol); opacity: 0; transition: opacity 0.4s, visibility 0.4s; }
        #toast.show { visibility: visible; opacity: 1; }
        #loader { text-align: center; padding: 50px; color: var(--pgd-hijau-botol); font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png" alt="Logo" class="logo-img">
    <h1>TARGET KPI TAHUNAN</h1>
</div>

<div class="summary-card" id="summary-area" style="display:none;">
    <span class="summary-label">TOTAL SCORE KPI:</span>
    <span class="summary-value" id="total-kpi-val">0</span>
</div>

<div class="filter-section">
    <select id="sel-kat" onchange="filterData()"><option value="all">KAT: SEMUA</option><option value="CP">CP</option><option value="UPC">UPC</option></select>
    <select id="sel-unit" onchange="filterData()">
        <option value="all">UNIT: SEMUA</option>
        <option value="WONOMULYO">WONOMULYO</option>
        <option value="LUYO">LUYO</option>
        <option value="SIDODADI">SIDODADI</option>
        <option value="CAMPALAGIAN">CAMPALAGIAN</option>
        <option value="PAMBUSUANG">PAMBUSUANG</option>
    </select>
</div>

<div class="container" id="display-area">
    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x"></i><br><br>Memuat Data...</div>
</div>

<div id="toast">Berhasil!</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyhDMqNAOczrEtE_HEQ4AcavD9RCVppYK9P7kOGavsDasItsX6aSJsmsjKgamcoLtYR1A/exec"; 
    let rawData = [];

    async function init() {
        try {
            const res = await fetch(`${API}?action=read`);
            rawData = await res.json();
            filterData();
        } catch (e) { document.getElementById('display-area').innerHTML = "Gagal memuat."; }
    }

    function filterData() {
        const kVal = document.getElementById('sel-kat').value.toUpperCase();
        const uVal = document.getElementById('sel-unit').value.toUpperCase();
        
        const filtered = rawData.filter(d => {
            const itemKat = String(d.kategori || "").toUpperCase().trim();
            const itemUnit = String(d.unit || "").toUpperCase().trim();
            return (kVal === "ALL" || itemKat.includes(kVal)) && (uVal === "ALL" || itemUnit.includes(uVal));
        });

        const totalScore = filtered.reduce((acc, curr) => acc + parseFloat(curr.nilaiKpi), 0);
        document.getElementById('summary-area').style.display = 'flex';
        document.getElementById('total-kpi-val').innerText = totalScore.toLocaleString('id-ID', {minimumFractionDigits: 1, maximumFractionDigits: 1});

        render(filtered);
    }

    function render(data) {
        const container = document.getElementById('display-area');
        container.innerHTML = data.length ? '' : '<p style="text-align:center; padding:20px; font-size:0.8rem;">Data tidak ditemukan.</p>';
        
        data.forEach(item => {
            const ach = parseFloat(item.persentase) || 0;
            const gapVal = item.target - item.realisasi;
            const gapColor = gapVal > 0 ? "red" : "black"; 
            const displayGap = Math.abs(gapVal);

            const card = document.createElement('div');
            card.className = 'kpi-card';
            card.innerHTML = `
                <div class="kpi-header"><i class="fas fa-layer-group"></i> ${item.komponen}</div>
                <div class="card-body">
                    <div class="data-row"><span class="label">Bobot</span><span class="value">${item.bobot}%</span></div>
                    <div class="data-row"><span class="label">Target</span><span class="value">${Number(item.target).toLocaleString('id-ID')}</span></div>
                    <div class="data-row"><span class="label">Realisasi</span><span class="value" id="real-${item.rowIdx}">${Number(item.realisasi).toLocaleString('id-ID')}</span></div>
                    <div class="data-row"><span class="label">Kekurangan</span><span class="value" id="gap-${item.rowIdx}" style="color: ${gapColor}; font-weight:700;">${displayGap.toLocaleString('id-ID')}</span></div>
                    <div class="input-group">
                        <input type="number" id="in-${item.rowIdx}" placeholder="Input">
                        <button class="btn-save" onclick="updateData(this, ${item.rowIdx})">SAVE</button>
                    </div>
                </div>
                <div class="kpi-footer">
                    <span class="progress-label">ACH: ${Number(ach).toLocaleString('id-ID')}%</span>
                    <div class="progress-bg"><div class="progress-fill" style="width: ${Math.min(ach, 100)}%"></div></div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function showProNotif(msg) {
        const x = document.getElementById("toast");
        x.innerText = msg; x.className = "show";
        setTimeout(function(){ x.className = ""; }, 3000);
    }

    async function updateData(btn, idx) {
        const inputEl = document.getElementById(`in-${idx}`);
        const val = parseFloat(inputEl.value);
        if(!val) { showProNotif("⚠️ Isi angka!"); return; }
        btn.innerText = "..."; btn.disabled = true;
        try {
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ rowIdx: idx, value: val }) });
            const item = rawData.find(d => d.rowIdx === idx);
            if (item) {
                item.realisasi = parseFloat(item.realisasi) + val;
                document.getElementById(`real-${idx}`).innerText = Number(item.realisasi).toLocaleString('id-ID');
                const gapEl = document.getElementById(`gap-${idx}`);
                const newGap = item.target - item.realisasi;
                gapEl.innerText = Math.abs(newGap).toLocaleString('id-ID');
                gapEl.style.color = newGap > 0 ? "red" : "black";
            }
            showProNotif("✅ Tersimpan!");
            inputEl.value = ""; btn.innerText = "SAVE"; btn.disabled = false;
            setTimeout(init, 2000); 
        } catch (e) { showProNotif("❌ Error!"); btn.innerText = "SAVE"; btn.disabled = false; }
    }
    window.onload = init;
</script>
</body>
</html>
