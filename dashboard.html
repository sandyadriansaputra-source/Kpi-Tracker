<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Unit KPI - Pegadaian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --pgd-hijau: #003319; --pgd-gold: #FDB913; --pgd-light: #f4f7f6; }
        body { background-color: var(--pgd-light); font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        
        .pegadaian-header {
            background: linear-gradient(180deg, #004d29 0%, #002b16 100%);
            border-bottom: 4px solid var(--pgd-gold);
            color: white; position: sticky; top: 0; z-index: 1020; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo-img { max-width: 110px; height: auto; }
        
        .kpi-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; overflow: hidden; }
        .card-header { 
            background: #fff; border-bottom: 1px solid #eee; font-weight: 800; 
            color: var(--pgd-hijau); font-size: 0.8rem; text-transform: uppercase;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1030; }
        .nav-item { text-align: center; color: #999; text-decoration: none; flex: 1; font-size: 0.65rem; font-weight: 700; }
        .nav-item.active { color: var(--pgd-hijau); }
        .nav-item.active i { color: var(--pgd-gold); }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border text-success" role="status"></div>
    <span class="mt-2 fw-bold text-success">Menganalisis Data Unit...</span>
</div>

<div class="pegadaian-header text-center py-3">
    <img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png" class="logo-img mb-1">
    <h1 class="m-0" style="font-size: 0.85rem; font-weight: 800; letter-spacing: 1px;">RANKING KPI PER UNIT</h1>
</div>

<div class="container py-4">
    <div class="row g-4 justify-content-center">
        
        <div class="col-12 col-lg-8">
            <div class="card kpi-card">
                <div class="card-header py-3 text-center">
                    <i class="fas fa-chart-bar me-2 text-warning"></i> Performa Bulanan per Unit
                </div>
                <div class="card-body p-3">
                    <canvas id="chartBulanan"></canvas>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-8">
            <div class="card kpi-card">
                <div class="card-header py-3 text-center">
                    <i class="fas fa-medal me-2 text-warning"></i> Performa Tahunan per Unit
                </div>
                <div class="card-body p-3">
                    <canvas id="chartTahunan"></canvas>
                </div>
            </div>
        </div>

    </div>
</div>

<nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-chart-pie"></i><span>Grafik</span></a>
    <a href="kpi.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Tahunan</span></a>
    <a href="bulanan.html" class="nav-item"><i class="fas fa-calendar-alt"></i><span>Bulanan</span></a>
</nav>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzOevko6R6UBXlQGTARR2F-t6TGw-xXlhCOWQsjLI20tI8qtnMD6I3OF_An__W45cTFig/exec";

    // Fungsi Pengelompokan Data per Unit
    function groupDataByUnit(items) {
        const unitMap = {};
        items.forEach(item => {
            const unit = item.unit.toUpperCase();
            if (!unitMap[unit]) unitMap[unit] = 0;
            unitMap[unit] += parseFloat(item.nilaiKpi) || 0;
        });

        // Sortir dari skor tertinggi ke terendah
        const sortedUnits = Object.entries(unitMap)
            .sort((a, b) => b[1] - a[1]);

        return {
            labels: sortedUnits.map(u => u[0]),
            scores: sortedUnits.map(u => u[1])
        };
    }

    function getBarColor(score) {
        if (score >= 90) return 'rgba(40, 167, 69, 0.8)'; // Hijau
        if (score >= 70) return 'rgba(253, 185, 19, 0.8)'; // Kuning Emas
        return 'rgba(220, 53, 69, 0.8)'; // Merah
    }

    function createBarChart(canvasId, unitData) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const colors = unitData.scores.map(s => getBarColor(s));

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: unitData.labels,
                datasets: [{
                    label: 'Total Skor KPI',
                    data: unitData.scores,
                    backgroundColor: colors,
                    borderRadius: 8,
                    barThickness: 25
                }]
            },
            options: {
                indexAxis: 'y', // Membuat diagram batang menyamping
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) { return ' Skor: ' + context.raw.toFixed(2); }
                        }
                    }
                },
                scales: {
                    x: { 
                        beginAtZero: true, 
                        max: 100,
                        grid: { display: false },
                        ticks: { font: { size: 10 } }
                    },
                    y: { 
                        grid: { display: false },
                        ticks: { font: { weight: 'bold', size: 11 } }
                    }
                }
            }
        });
    }

    async function init() {
        const overlay = document.getElementById('loading-overlay');
        try {
            const [resB, resT] = await Promise.all([
                fetch(`${API}?action=read&sheet=DATA_UI BULANAN&t=${Date.now()}`).then(r => r.json()),
                fetch(`${API}?action=read&sheet=DATA_UI TAHUNAN&t=${Date.now()}`).then(r => r.json())
            ]);

            const bulananUnit = groupDataByUnit(resB.items);
            const tahunanUnit = groupDataByUnit(resT.items);

            createBarChart('chartBulanan', bulananUnit);
            createBarChart('chartTahunan', tahunanUnit);

        } catch (e) {
            alert("Koneksi gagal. Cek link API atau Google Sheets Bapak.");
        } finally {
            overlay.style.display = 'none';
        }
    }

    window.onload = init;
</script>
</body>
</html>
