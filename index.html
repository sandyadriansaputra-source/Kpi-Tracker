<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPI Monitoring - Grafik</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>

<body style="touch-action: manipulation;">
    <div id="loader">
        <div class="loader-card">
            <div class="spinner"></div>
            <span
                style="font-size: 0.65rem; font-weight: 800; color: var(--pgd-hijau); margin-top: 12px; letter-spacing: 1px;">MEMPROSES
                DATA...</span>
        </div>
    </div>

    <div class="header">
        <img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png"
            class="logo-img">
        <h1>DASHBOARD MONITORING KPI</h1>
    </div>

    <div class="container">
        <div id="data-date"
            style="font-size: 0.6rem; text-align: center; margin: 10px 0; color: #eef2f5; font-style: italic;">Memuat
            data...</div>
        <div class="kpi-card">
            <div id="cp-list-container"></div>
        </div>
        <div
            style="font-size: 0.65rem; font-weight: 900; color: #f8f7f7; text-transform: uppercase; letter-spacing: 1.5px; border-left: 3px solid var(--pgd-gold); padding-left: 10px; margin: 15px 0 10px 0;">
            RANKING PERFORMA UPC</div>
        <div class="kpi-card">
            <div class="kpi-header">TOTAL SKOR BULANAN</div>
            <div class="card-body" style="padding:10px;"><canvas id="chartUPCBulanan"
                    style="max-height: 250px;"></canvas></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-header">TOTAL SKOR TAHUNAN</div>
            <div class="card-body" style="padding:10px;"><canvas id="chartUPCTahunan"
                    style="max-height: 250px;"></canvas></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active" id="nav-grafik">
            <i class="fas fa-chart-pie"></i><span>Grafik</span>
        </a>
        <a href="kpi.html" class="nav-item" id="nav-tahunan">
            <i class="fas fa-calendar-check"></i><span>Tahunan</span>
        </a>
        <a href="bulanan.html" class="nav-item" id="nav-bulanan">
            <i class="fas fa-calendar-alt"></i><span>Bulanan</span>
        </a>
        <a href="harian.html" class="nav-item" id="nav-harian">
            <i class="fas fa-edit"></i><span>Harian</span>
        </a>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzCxMQszKz1pbjtM6b1LkAECP-IGbxSimGDXNFOzHdTYfj7iJ-TYDwcsV97hsYs1ee7qA/exec";
        Chart.register(ChartDataLabels);

        function hideLoader() {
            const ld = document.getElementById('loader');
            ld.style.opacity = '0';
            setTimeout(() => { ld.style.display = 'none'; }, 400);
        }

        async function init() {
            try {
                const [resB, resT] = await Promise.all([
                    fetch(`${API}?action=read&sheet=KPI TRACKER BLN&t=${Date.now()}`).then(r => r.json()),
                    fetch(`${API}?action=read&sheet=KPI TRACKER THN&t=${Date.now()}`).then(r => r.json())
                ]);
                document.getElementById('data-date').innerText = `Update: ${resB.date || "-"}`;
                renderCP(resB.items, resT.items);
                createChart('chartUPCBulanan', processUPC(resB.items));
                createChart('chartUPCTahunan', processUPC(resT.items));
            } catch (e) { console.error(e); } finally { hideLoader(); }
        }

        function renderCP(b, t) {
            const cpMap = {};
            b.filter(i => i.kategori.includes("CP")).forEach(i => { const u = i.unit.toUpperCase(); if (!cpMap[u]) cpMap[u] = { b: 0, t: 0 }; cpMap[u].b += parseFloat(i.nilaiKpi) || 0; });
            t.filter(i => i.kategori.includes("CP")).forEach(i => { const u = i.unit.toUpperCase(); if (cpMap[u]) cpMap[u].t += parseFloat(i.nilaiKpi) || 0; });

            // SORTING BERDASARKAN SKOR TERTINGGI
            const sortedCP = Object.keys(cpMap).sort((a, b) => cpMap[b].b - cpMap[a].b);

            const cont = document.getElementById('cp-list-container'); cont.innerHTML = "";
            sortedCP.forEach((u, idx) => {
                const isWon = u.includes("WONOMULYO");
                // MEDALI TOP 3 CABANG
                let medal = idx === 0 ? "🥇 " : idx === 1 ? "🥈 " : idx === 2 ? "🥉 " : "🏪 ";

                cont.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #f0f0f0; ${isWon ? 'background:linear-gradient(90deg, #fffcf0 0%, #fff 100%); border:1.5px solid #FDB913; border-radius:15px; margin:10px; position:relative;' : ''}">
                    ${isWon ? '<span style="position:absolute; top:-8px; left:12px; background:#FDB913; font-size:0.45rem; font-weight:900; padding:1px 6px; border-radius:4px;">CABANG</span>' : ''}
                    <div style="font-weight:800; font-size:0.85rem;">${medal}${u}</div>
                    <div style="text-align:right;"><div style="font-weight:900; font-size:1.0rem;">${cpMap[u].b.toFixed(2)} / ${cpMap[u].t.toFixed(2)}</div><span style="font-size:0.45rem; color:#888;">B / T</span></div>
                </div>`;
            });
        }

        function processUPC(items) {
            const m = {}; items.filter(i => i.kategori.includes("UPC")).forEach(i => { const u = i.unit.toUpperCase(); m[u] = (m[u] || 0) + (parseFloat(i.nilaiKpi) || 0); });

            // SORTING TERTINGGI KE TERENDAH
            const sorted = Object.entries(m).sort((a, b) => b[1] - a[1]);

            // TAMBAHKAN MEDALI KE LABEL DIAGRAM
            const labels = sorted.map((x, idx) => {
                if (idx === 0) return "🥇 " + x[0];
                if (idx === 1) return "🥈 " + x[0];
                if (idx === 2) return "🥉 " + x[0];
                return x[0];
            });

            return { l: labels, v: sorted.map(x => x[1]) };
        }

        function createChart(id, d) {
            new Chart(document.getElementById(id), {
                type: 'bar',
                data: {
                    labels: d.l,
                    datasets: [{
                        data: d.v,
                        backgroundColor: d.v.map(v => v <= 90 ? '#dc3545' : v <= 100 ? '#ffc107' : '#198754'),
                        borderRadius: 6,
                        barThickness: 20
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    events: [], // MATIKAN INTERAKSI SENTUH
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }, // MATIKAN DETAIL POPUP
                        datalabels: {
                            anchor: 'end',
                            align: 'left',
                            color: '#fff',
                            font: { weight: 'bold', size: 9 },
                            formatter: v => v.toFixed(2)
                        }
                    },
                    scales: {
                        x: { display: false, suggestedMax: 115 },
                        y: {
                            grid: { display: false },
                            ticks: { font: { weight: 'bold', size: 8.5 }, color: '#003319' }
                        }
                    }
                }
            });
        }
        window.onload = init;
    </script>
</body>

</html>
