<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KPI Monitoring - Input</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body style="touch-action: manipulation;">
    <div id="loader">
        <div class="loader-card">
            <div class="spinner"></div>
            <span
                style="font-size: 0.65rem; font-weight: 800; color: var(--pgd-hijau); margin-top: 12px; letter-spacing: 1px;">MEMPROSES
                DATA...</span>
        </div>
    </div>

    <div class="header">
        <img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png"
            class="logo-img">
        <h1 id="page-title">KPI MONITORING</h1>
    </div>

    <div class="premium-score-bar" id="summary-area" style="display:none;">
        <div class="score-info"><span>Total Skor KPI</span><strong id="total-kpi-val">0.00</strong></div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="data-date" style="font-size:0.5rem; color:#aaa; font-weight:700; text-align:right;">-</div>
            <div class="btn-hard-reset" onclick="hardReset()"><i class="fas fa-trash-alt"></i></div>
        </div>
    </div>

    <div class="filter-section" style="padding:10px 15px; display:flex; gap:8px; max-width:500px; margin:0 auto;">
        <select id="sel-kat" onchange="filterData()">
            <option value="all">KAT: SEMUA</option>
            <option value="CP">CP</option>
            <option value="UPC">UPC</option>
        </select>
        <select id="sel-unit" onchange="filterData()">
            <option value="all">UNIT: SEMUA</option>
            <option value="WONOMULYO">WONOMULYO</option>
            <option value="LUYO">LUYO</option>
            <option value="SIDODADI">SIDODADI</option>
            <option value="CAMPALAGIAN">CAMPALAGIAN</option>
            <option value="PAMBUSUANG">PAMBUSUANG</option>
        </select>
    </div>

    <div class="container" id="display-area"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item" id="nav-grafik">
            <i class="fas fa-chart-pie"></i><span>Grafik</span>
        </a>
        <a href="kpi.html" class="nav-item" id="nav-tahunan">
            <i class="fas fa-calendar-check"></i><span>Tahunan</span>
        </a>
        <a href="bulanan.html" class="nav-item active" id="nav-bulanan">
            <i class="fas fa-calendar-alt"></i><span>Bulanan</span>
        </a>
        <a href="harian.html" class="nav-item" id="nav-harian">
            <i class="fas fa-edit"></i><span>Harian</span>
        </a>
    </nav>

    <div id="toast"></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzCxMQszKz1pbjtM6b1LkAECP-IGbxSimGDXNFOzHdTYfj7iJ-TYDwcsV97hsYs1ee7qA/exec";
        const isBulanan = window.location.pathname.includes('bulanan');
        const NAMA_SHEET = isBulanan ? "KPI TRACKER BLN" : "KPI TRACKER THN";

        if (isBulanan) { document.getElementById('nav-bulanan').classList.add('active'); } else { document.getElementById('nav-tahunan').classList.add('active'); }

        function hideLoader() { document.getElementById('loader').style.opacity = '0'; setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 400); }
        function showLoader() { document.getElementById('loader').style.display = 'flex'; document.getElementById('loader').style.opacity = '1'; }

        let rawData = [];
        async function init() {
            try {
                const res = await fetch(`${API}?action=read&sheet=${encodeURIComponent(NAMA_SHEET)}&t=${Date.now()}`).then(r => r.json());
                rawData = res.items; document.getElementById('data-date').innerText = res.date || "-";
                filterData();
            } catch (e) { console.error(e); } finally { hideLoader(); }
        }

        // Fungsi untuk Menutup Modal
        function closeConfirm() { document.getElementById('confirm-overlay').style.display = 'none'; }

        // Fungsi Hard Reset Versi Premium
        async function hardReset() {
            const sheet = document.getElementById('sel-sheet') ? document.getElementById('sel-sheet').value : NAMA_SHEET;
            const modal = document.getElementById('confirm-overlay');
            const confirmBtn = document.getElementById('btn-confirm-action');
            const confirmText = document.getElementById('confirm-text');

            // 1. Tampilkan Modal & Set Pesan
            confirmText.innerText = "Seluruh data di " + sheet + " akan dihapus permanen. Lanjutkan?";
            const pwInput = document.getElementById('reset-password-input');
            if (pwInput) pwInput.value = "";
            modal.style.display = 'flex';
            if (pwInput) setTimeout(() => pwInput.focus(), 100);

            // 2. Logika Klik Tombol "YA"
            confirmBtn.onclick = async function () {
                if (pwInput && pwInput.value !== "Andresandy77") {
                    showToast('<i class="fas fa-times-circle"></i> Password Otorisasi Salah!');
                    pwInput.style.borderColor = "var(--pgd-red)";
                    return;
                }
                closeConfirm();
                showLoader();
                try {
                    await fetch(API, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'reset_all', sheet: sheet })
                    });
                    // Notifikasi sukses menggunakan toast Pro yang sudah ada
                    showToast('<i class="fas fa-broom"></i> Data Berhasil Dibersihkan!');
                    setTimeout(() => { init(); }, 1200);
                } catch (e) {
                    alert("Gagal mengosongkan data!");
                    hideLoader();
                }
            };
        }

        function filterData() {
            const k = document.getElementById('sel-kat').value.toUpperCase();
            const u = document.getElementById('sel-unit').value.toUpperCase();

            // 1. FILTER DATA BERDASARKAN UNIT & KATEGORI
            let filtered = rawData.filter(d => (k === "ALL" || d.kategori.includes(k)) && (u === "ALL" || d.unit.includes(u)));

            // 2. SORTING (PENCAPAIAN TERTINGGI KE TERENDAH)
            // Gunakan parseFloat untuk memastikan angka persentase terbaca benar
            filtered.sort((a, b) => {
                return parseFloat(b.persentase) - parseFloat(a.persentase);
            });

            // 3. HITUNG TOTAL SKOR KPI (DARI DATA YANG SUDAH TERFILTER & TERSORTIR)
            const totalScore = filtered.reduce((acc, curr) => acc + parseFloat(curr.nilaiKpi), 0);

            // TAMPILKAN TOTAL PADA GOLD BAR
            document.getElementById('summary-area').style.display = 'flex';
            document.getElementById('total-kpi-val').innerText = totalScore.toLocaleString('id-ID', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // 4. KIRIM DATA KE RENDER UNTUK DITAMPILKAN
            render(filtered);
        }

        function render(data) {
            const cont = document.getElementById('display-area');
            const decimalComponents = [
                "npl emas", "cashless disbursement", "lar gadai", "npl non gadai",
                "lar emas", "lar non gadai", "tabungan emas", "te sinergi holding",
                "deposito emas", "npl gadai", "gramasi produk galeri 24"
            ];
            cont.innerHTML = data.map(i => {
                const ach = parseFloat(i.persentase) || 0;
                const gap = i.target - i.realisasi;
                const cmp = i.komponen ? i.komponen.toLowerCase() : "";
                const keepDecimals = decimalComponents.some(d => cmp.includes(d)) && !cmp.includes("nasabah");
                return `
                <div class="kpi-card">
                    <div class="kpi-card-header">
                        <div style="display:flex; align-items:center; gap:6px; line-height:1.2;">
                            <i class="fas fa-dot-circle" style="color:var(--pgd-gold); font-size:0.65rem;"></i> 
                            <strong style="font-size:0.85rem;">${i.komponen}</strong>
                        </div>
                        <div class="help-icon-btn" onclick="showHelp('${i.komponen.replace(/'/g, "\\'")}', '${(i.keterangan || 'Belum ada detail untuk komponen ini.').replace(/'/g, "\\'")}')">
                            <i class="fas fa-question"></i>
                        </div>
                    </div>
                    <div style="padding:10px 15px;">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; padding:3px 0; border-bottom:1px dashed #eee; margin-bottom:5px; line-height:1.2;">
                            <span style="color:#777;">Bobot Target / Pencapaian</span>
                            <span style="font-weight:800; color:var(--pgd-hijau);">${parseFloat(i.bobot).toFixed(2)} / ${parseFloat(i.nilaiKpi).toFixed(2)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; padding:2px 0; line-height:1.2;"><span>Target</span><span style="font-weight:800;">${keepDecimals ? Number(i.target).toLocaleString('id-ID', { maximumFractionDigits: 2 }) : Number(i.target).toLocaleString('id-ID', { maximumFractionDigits: 0 })}</span></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; padding:2px 0; line-height:1.2;"><span>Realisasi</span><span style="font-weight:800;">${keepDecimals ? Number(i.realisasi).toLocaleString('id-ID', { maximumFractionDigits: 2 }) : Number(i.realisasi).toLocaleString('id-ID', { maximumFractionDigits: 0 })}</span></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; padding:2px 0; line-height:1.2;"><span>Kurang</span><span style="font-weight:800; color:${gap > 0 ? 'red' : 'green'}">${keepDecimals ? Math.abs(gap).toLocaleString('id-ID', { maximumFractionDigits: 2 }) : Math.abs(gap).toLocaleString('id-ID', { maximumFractionDigits: 0 })}</span></div>
                        <div class="input-group"><input type="number" id="in-${i.rowIdx}" placeholder="Input"><button class="btn-save" onclick="updateData(this, ${i.rowIdx})">SAVE</button></div>
                    </div>
                    <div style="padding:8px 15px; background:#fff;">
                        <div style="display:flex; justify-content:space-between; font-size:0.6rem; font-weight:900; color:#999; margin-bottom:5px;"><span>PROGRESS</span><span style="color:var(--pgd-hijau); font-size:0.7rem;">${ach.toFixed(2)}%</span></div>
                        <div style="background:#eee; height:6px; border-radius:10px; overflow:hidden;"><div style="height:100%; width:${Math.min(ach, 100)}%; background:linear-gradient(90deg, #FDB913, #28a745); transition: 1s ease;"></div></div>
                    </div>
                </div>`;
            }).join('');
        }

        // Fungsi Update Data dengan Efek Berkedip
        // GANTI ATAU TAMBAHKAN DI PALING BAWAH SCRIPT
        async function updateData(btn, idx) {
            const valInput = document.getElementById(`in-${idx}`).value;
            const val = parseFloat(valInput);
            if (isNaN(val)) return;

            const originalText = btn.innerText;
            btn.innerText = "...";

            // Deteksi otomatis nama sheet
            const sheet = document.getElementById('sel-sheet') ? document.getElementById('sel-sheet').value : NAMA_SHEET;

            try {
                await fetch(API, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'update', rowIdx: idx, value: val, sheet: sheet })
                });

                // EFEK BERKEDIP
                document.body.classList.add('flash-effect');
                setTimeout(() => { document.body.classList.remove('flash-effect'); }, 400);

                showToast('<i class="fas fa-check-circle"></i> Berhasil Diupdate!');
                document.getElementById(`in-${idx}`).value = "";

                // Refresh data tanpa loading putih
                initSilent(sheet);

            } catch (e) {
                btn.innerText = originalText;
                alert("Gagal koneksi!");
            } finally {
                btn.innerText = originalText;
            }
        }

        async function initSilent(sheetName) {
            try {
                const res = await fetch(`${API}?action=read&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`).then(r => r.json());

                // Update variabel data sesuai file masing-masing
                if (typeof raw !== 'undefined') raw = res.items; // Untuk harian
                if (typeof rawData !== 'undefined') rawData = res.items; // Untuk kpi/bulanan

                filterData(); // Jalankan penyusunan ulang tampilan
            } catch (e) { console.error("Silent refresh failed"); }
        }

        function showToast(m) {
            const t = document.getElementById("toast");
            t.innerHTML = m;
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 2500);
        }

        function showHelp(title, text) {
            document.getElementById('help-title').innerText = title;
            document.getElementById('help-text').innerText = text;
            const overlay = document.getElementById('help-overlay');
            overlay.style.display = 'flex';
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.opacity = '1'; }, 10);
        }

        function closeHelp() {
            const overlay = document.getElementById('help-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }
        window.onload = init;
    </script>
    <div id="confirm-overlay">
        <div class="confirm-card">
            <div class="confirm-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="confirm-title">KONFIRMASI HAPUS</div>
            <div class="confirm-msg" id="confirm-text">Apakah Bapak yakin ingin membersihkan seluruh data harian ini?
            </div>
            <input type="password" id="reset-password-input" placeholder="Masukkan Password Otorisasi"
                style="width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; text-align: center; font-family: inherit; font-size: 0.8rem; font-weight: 700; color: #333; outline: none; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);"
                onfocus="this.style.borderColor='var(--pgd-hijau)'" onblur="this.style.borderColor='#eee'">
            <div class="confirm-buttons">
                <button class="btn-modal btn-no" onclick="closeConfirm()">BATAL</button>
                <button class="btn-modal btn-yes" id="btn-confirm-action">YA, HAPUS</button>
            </div>
        </div>
    </div>
    <div id="help-overlay" style="display:none;">
        <div class="help-card">
            <div class="help-header">
                <div class="help-title-icon"><i class="fas fa-info-circle"></i></div>
                <div class="help-title-text" id="help-title">DETAIL KOMPONEN</div>
            </div>
            <div class="help-content" id="help-text">
                Keterangan detail mengenai komponen ini akan muncul di sini.
            </div>
            <button class="btn-close-help" onclick="closeHelp()">MENGERTI</button>
        </div>
    </div>
</body>

</html>
