<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Bulanan - Pegadaian</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --pgd-hijau-botol: #003319; --pgd-green-gradient: linear-gradient(180deg, #004d29 0%, #002b16 100%); --pgd-gold: #FDB913; --pgd-light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--pgd-light); margin: 0; padding-bottom: 80px; }
        .header { background: var(--pgd-green-gradient); color: white; padding: 10px 15px; display: flex; flex-direction: column; align-items: center; border-bottom: 4px solid var(--pgd-gold); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo-img { max-width: 120px; height: auto; margin-bottom: 4px; }
        .header h1 { margin: 0; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 800; }
        .summary-card { background: white; margin: 8px auto 2px auto; max-width: 240px; border-radius: 50px; padding: 5px 15px; display: flex; justify-content: center; align-items: center; gap: 10px; border: 1.5px solid var(--pgd-gold); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .summary-label { font-size: 0.65rem; font-weight: 800; color: #666; text-transform: uppercase; }
        .summary-value { font-size: 1.1rem; font-weight: 900; color: var(--pgd-hijau-botol); }
        .data-date { font-size: 0.6rem; color: #999; text-align: center; margin-bottom: 10px; font-style: italic; }
        .filter-section { background: #ffffff; padding: 6px 12px; display: flex; gap: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 72px; z-index: 999; }
        select { flex: 1; padding: 6px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.7rem; color: var(--pgd-hijau-botol); font-weight: 700; outline: none; }
        .container { padding: 10px; max-width: 480px; margin: 0 auto; }
        .kpi-card { background: white; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eef2f0; }
        .kpi-header { background: #fdfdfd; padding: 10px 12px; font-weight: 800; color: var(--pgd-hijau-botol); font-size: 0.85rem; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .kpi-header i { margin-right: 8px; color: var(--pgd-gold); }
        .data-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #f0f0f0; font-size: 0.8rem; }
        .input-group { margin-top: 10px; display: flex; gap: 6px; background: #f4fbf8; padding: 8px; border-radius: 8px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccd6d1; border-radius: 5px; font-size: 0.85rem; text-align: center; outline: none; }
        .btn-save { background: var(--pgd-hijau-botol); color: white; border: none; padding: 0 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .kpi-footer { background: #fffef7; padding: 10px 12px; border-top: 1px solid #f9ebbe; }
        .progress-bg { background: #e9ecef; height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pgd-gold), #28a745); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1001; }
        .nav-item { text-align: center; color: #999; text-decoration: none; flex: 1; }
        .nav-item.active { color: var(--pgd-hijau-botol); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 2px; }
        .nav-item span { font-size: 0.65rem; font-weight: 700; }
        #toast { visibility: hidden; min-width: 200px; background: white; color: var(--pgd-hijau-botol); text-align: center; border-radius: 50px; padding: 10px; position: fixed; z-index: 2000; bottom: 80px; left: 50%; transform: translateX(-50%); font-weight: 800; border: 2px solid var(--pgd-hijau-botol); opacity: 0; transition: 0.4s; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>
<div class="header">
    <img src="https://monev.pegadaian.co.id/userdata/profile_site/5662a273c270a215cdc46900d8a882f280e84b32c3f02.png" alt="Logo" class="logo-img">
    <h1>KPI BULANAN</h1>
</div>
<div class="summary-card" id="summary-area" style="display:none;">
    <span class="summary-label">TOTAL KPI:</span>
    <span class="summary-value" id="total-kpi-val">0</span>
</div>
<div id="data-date" class="data-date"></div>
<div class="filter-section">
    <select id="sel-kat" onchange="filterData()"><option value="all">KAT: SEMUA</option><option value="CP">CP</option><option value="UPC">UPC</option></select>
    <select id="sel-unit" onchange="filterData()"><option value="all">UNIT: SEMUA</option><option value="WONOMULYO">WONOMULYO</option><option value="LUYO">LUYO</option><option value="SIDODADI">SIDODADI</option><option value="CAMPALAGIAN">CAMPALAGIAN</option><option value="PAMBUSUANG">PAMBUSUANG</option></select>
</div>
<div class="container" id="display-area"></div>
<nav class="bottom-nav">
    <a href="kpi.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Tahunan</span></a>
    <a href="bulanan.html" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>Bulanan</span></a>
</nav>
<div id="toast">Berhasil!</div>
<script>
    const API = "https://script.google.com/macros/s/AKfycbzOevko6R6UBXlQGTARR2F-t6TGw-xXlhCOWQsjLI20tI8qtnMD6I3OF_An__W45cTFig/exec"; 
    const NAMA_SHEET = "DATA_UI BULANAN";
    let rawData = [];
    async function init() {
        try {
            const res = await fetch(`${API}?action=read&sheet=${encodeURIComponent(NAMA_SHEET)}&t=${Date.now()}`);
            const result = await res.json();
            rawData = result.items; 
            document.getElementById('data-date').innerText = "Data per: " + (result.date || "-") + " | " + (result.infoM2 || "");
            filterData();
        } catch (e) { document.getElementById('display-area').innerHTML = "Gagal memuat."; }
    }
    function filterData() {
        const kVal = document.getElementById('sel-kat').value.toUpperCase();
        const uVal = document.getElementById('sel-unit').value.toUpperCase();
        const filtered = rawData.filter(d => (kVal === "ALL" || d.kategori.includes(kVal)) && (uVal === "ALL" || d.unit.includes(uVal)));
        const totalScore = filtered.reduce((acc, curr) => acc + parseFloat(curr.nilaiKpi), 0);
        document.getElementById('summary-area').style.display = 'flex';
        document.getElementById('total-kpi-val').innerText = totalScore.toLocaleString('id-ID', {maximumFractionDigits: 2});
        render(filtered);
    }
    function render(data) {
        const container = document.getElementById('display-area');
        container.innerHTML = "";
        data.forEach(item => {
            const ach = parseFloat(item.persentase) || 0;
            const gap = item.target - item.realisasi;
            const card = document.createElement('div');
            card.className = 'kpi-card';
            const fBobot = parseFloat(item.bobot).toLocaleString('id-ID', {maximumFractionDigits: 2});
            const fScore = parseFloat(item.nilaiKpi).toLocaleString('id-ID', {maximumFractionDigits: 2});
            const fTarget = Number(item.target).toLocaleString('id-ID', {maximumFractionDigits: 2});
            const fReal = Number(item.realisasi).toLocaleString('id-ID', {maximumFractionDigits: 2});
            const fGap = Math.abs(gap).toLocaleString('id-ID', {maximumFractionDigits: 2});
            const fAch = ach.toLocaleString('id-ID', {maximumFractionDigits: 2});
            card.innerHTML = `<div class="kpi-header"><i class="fas fa-layer-group"></i> ${item.komponen}</div><div class="card-body"><div class="data-row"><span>Bobot</span><span style="font-weight:700">${fBobot} / ${fScore}</span></div><div class="data-row"><span>Target</span><span style="font-weight:700">${fTarget}</span></div><div class="data-row"><span>Realisasi</span><span style="font-weight:700" id="real-${item.rowIdx}">${fReal}</span></div><div class="data-row"><span>Kekurangan</span><span style="font-weight:700; color:${gap > 0 ? 'red' : 'black'}" id="gap-${item.rowIdx}">${fGap}</span></div><div class="input-group"><input type="number" id="in-${item.rowIdx}" placeholder="Input"><button class="btn-save" onclick="updateData(this, ${item.rowIdx})">SAVE</button></div></div><div class="kpi-footer"><span style="font-size:0.6rem; font-weight:800">ACH: ${fAch}%</span><div class="progress-bg"><div class="progress-fill" style="width:${Math.min(ach, 100)}%"></div></div></div>`;
            container.appendChild(card);
        });
    }
    async function updateData(btn, idx) {
        const val = parseFloat(document.getElementById(`in-${idx}`).value);
        if(!val) return; btn.innerText = "...";
        try {
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ rowIdx: idx, value: val, sheet: NAMA_SHEET }) });
            document.getElementById("toast").className = "show";
            setTimeout(() => { document.getElementById("toast").className = ""; init(); }, 2000);
        } catch (e) { btn.innerText = "SAVE"; }
    }
    window.onload = init;
</script>
</body>
</html>
